<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Planning Multi CCO 2026</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0f172a;color:#e2e8f0;font-size:13px;height:100vh;display:flex;flex-direction:column;overflow:hidden}
input,select,button{font-family:inherit;font-size:13px}
input[type=text],input[type=date],input[type=number],select{padding:6px 10px;border:1px solid #334155;border-radius:6px;background:#1e293b;color:#e2e8f0;outline:none;width:100%}
input:focus,select:focus{border-color:#3b82f6}
button{cursor:pointer;border:none;border-radius:6px;padding:7px 14px;font-weight:500;transition:all .15s}
.btn{background:#1e293b;border:1px solid #334155;color:#cbd5e1}.btn:hover{background:#263344}
.btn-p{background:#3b82f6;color:#fff}.btn-p:hover{background:#2563eb}
.btn-g{background:#16a34a;color:#fff}.btn-g:hover{background:#15803d}
.btn-sm{padding:4px 10px;font-size:12px}
#app{display:flex;height:100vh;overflow:hidden}
#sb{width:210px;background:#0a0f1e;border-right:1px solid #1e293b;display:flex;flex-direction:column;flex-shrink:0}
#sbh{padding:16px 14px 12px;border-bottom:1px solid #1e293b}
#sbh h1{font-size:15px;font-weight:700;color:#f8fafc}
#sbh p{font-size:11px;color:#64748b;margin-top:2px}
#sbn{flex:1;padding:8px;overflow-y:auto}
.ni{display:flex;align-items:center;gap:9px;padding:9px 10px;border-radius:7px;cursor:pointer;color:#94a3b8;margin-bottom:1px;transition:.12s;user-select:none}
.ni:hover{background:#1e293b;color:#e2e8f0}.ni.on{background:#1d3557;color:#60a5fa}
.ni .ic{font-size:15px;width:18px;text-align:center}.ni .lb{font-size:13px;font-weight:500}
.nbdg{margin-left:auto;font-size:10px;padding:1px 6px;border-radius:10px;background:#16a34a40;color:#4ade80}
#sbf{padding:10px 14px;border-top:1px solid #1e293b}
.sb-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px}
.ss{background:#1e293b;border-radius:6px;padding:6px;text-align:center}
.sv{font-size:16px;font-weight:700;color:#f8fafc;display:block}.sl{font-size:10px;color:#64748b}
#main{flex:1;display:flex;flex-direction:column;overflow:hidden}
#tb{background:#0a0f1e;border-bottom:1px solid #1e293b;padding:0 20px;height:50px;display:flex;align-items:center;gap:12px;flex-shrink:0}
#tb h2{font-size:14px;font-weight:600;flex:1;color:#f1f5f9}
#ct{flex:1;overflow-y:auto;padding:16px 20px;background:#0f172a}
.cd{background:#1e293b;border:1px solid #334155;border-radius:10px;padding:14px;margin-bottom:12px}
.cd-t{font-size:13px;font-weight:600;color:#f1f5f9;margin-bottom:10px;display:flex;align-items:center;gap:8px}
.cd-t small{font-size:11px;font-weight:400;color:#64748b}
.lbl{font-size:11px;font-weight:600;color:#64748b;letter-spacing:.04em;margin-bottom:5px;display:block}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.ic2{background:#263244;border:1px solid #334155;border-radius:8px;padding:12px;margin-bottom:8px}
.ih{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.in{font-weight:600;flex:1;font-size:13px;color:#f1f5f9}
.cg{display:flex;flex-wrap:wrap;gap:4px;margin-top:5px}
.cp{display:inline-flex;align-items:center;padding:3px 9px;border-radius:100px;font-size:11px;font-weight:600;cursor:pointer;border:1.5px solid #334155;background:#1e293b;color:#64748b;transition:.12s;white-space:nowrap}
.cp:hover{border-color:#475569}
.db{display:inline-flex;align-items:center;justify-content:center;width:32px;height:24px;border-radius:5px;font-size:11px;font-weight:600;cursor:pointer;border:1.5px solid #334155;background:#1e293b;color:#64748b;transition:.12s}
.db.on{background:#1d3557;border-color:#3b82f6;color:#60a5fa}
.ms{background:#263244;border:1px solid #334155;border-radius:8px;padding:10px 12px}
.ms .v{font-size:20px;font-weight:700;color:#f8fafc}.ms .l{font-size:11px;color:#64748b;margin-top:1px}
.al{padding:9px 12px;border-radius:7px;font-size:12px;margin-bottom:8px}
.aw{background:#451a0320;border:1px solid #a16207;color:#fde68a}
.ai{background:#1e3a5f20;border:1px solid #1d4ed8;color:#93c5fd}
.aok{background:#14532d20;border:1px solid #166534;color:#86efac}
.dz{border:2px dashed #334155;border-radius:8px;padding:22px;text-align:center;cursor:pointer;transition:.15s;background:#0f172a}
.dz:hover,.dz.dg{border-color:#3b82f6;background:#1d3557}
.dz h3{font-size:13px;font-weight:600;color:#94a3b8;margin-bottom:4px}.dz p{font-size:11px;color:#64748b}
.ht{border-collapse:collapse;font-size:11px}
.ht th{padding:5px 7px;background:#1e293b;border:1px solid #334155;font-weight:600;text-align:center;color:#94a3b8}
.ht td{border:1px solid #0f172a;text-align:center;padding:0;width:48px;height:26px}
.hc{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-weight:700;font-family:monospace;font-size:11px}
.htm{font-size:11px;font-family:monospace;color:#64748b;padding:3px 8px;text-align:right;background:#1e293b;border:1px solid #334155;white-space:nowrap}
/* ── SCHEDULE TABLE ─────────────────────────────── */
#sw{overflow:auto;max-height:calc(100vh - 280px);border-radius:8px;border:1px solid #1a2744}
.st{border-collapse:collapse;white-space:nowrap;font-size:12px}
.st th,.st td{border:1px solid #1a2744;padding:0}
.wh{background:#0d1b2a;color:#60a5fa;font-weight:700;font-size:11px;padding:5px 10px;text-align:center;letter-spacing:.05em}
.dh{background:#0f2340;color:#9ca3af;font-size:11px;font-weight:600;padding:4px 6px;text-align:center;min-width:72px}
.dh .dn{font-size:10px;color:#64748b}.dh.we{background:#0a1628;color:#475569}
.nh{background:#0a0f1e;color:#64748b;font-size:11px;font-weight:600;padding:5px 10px;text-align:left;min-width:190px;position:sticky;left:0;z-index:5;border-right:2px solid #1e3a5f}
.tn{background:#f59e0b;color:#000;font-weight:700;font-size:12px;padding:5px 10px;text-align:left;position:sticky;left:0;z-index:4;cursor:default;min-width:190px;border-right:2px solid #c17d10}
.cc{background:#111827;color:#4b5563;font-size:10px;padding:3px 10px;position:sticky;left:0;z-index:4;min-width:190px;line-height:1.4;border-right:2px solid #1e293b}
.sw-cell{background:#1e3a5f;color:#e2e8f0;font-weight:700;font-size:12px;text-align:center;padding:5px 4px;cursor:pointer;transition:background .1s;min-width:72px;position:relative}
.sw-cell:hover{background:#253c5a}
.so{background:#0c1220;color:#1e293b;text-align:center;padding:5px 4px;min-width:72px}
.swe{background:#090e1a;color:#111827;text-align:center;padding:5px 4px;min-width:72px}
.sc{background:#0c1220;padding:3px 4px;min-width:72px}
.scw{background:#07090f;padding:3px 4px;min-width:72px}
/* Special statuses */
.s-cp {background:#15803d;color:#fff;font-weight:700;font-size:11px;text-align:center;padding:5px 4px;min-width:72px}
.s-mal{background:#b91c1c;color:#fff;font-weight:700;font-size:11px;text-align:center;padding:5px 4px;min-width:72px}
.s-tad{background:#0c4a6e;color:#7dd3fc;font-weight:700;font-size:11px;text-align:center;padding:5px 4px;min-width:72px}
.s-frm{background:#78350f;color:#fde68a;font-weight:700;font-size:11px;text-align:center;padding:5px 4px;min-width:72px}
.s-off{background:#0c1220;color:#334155;font-size:10px;text-align:center;padding:5px 4px;min-width:72px}
.cvh{background:#07090f;color:#475569;font-size:10px;padding:3px 8px;text-align:center;font-weight:600;position:sticky;left:0;border-right:2px solid #1e293b}
.cvc{background:#07090f;padding:2px 3px;text-align:center;min-width:72px}
.cvb{height:22px;border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:#fff}
.wn{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px;align-items:center}
.wb{padding:4px 11px;font-size:11px;font-weight:600;border-radius:5px;background:#1e293b;border:1px solid #334155;color:#94a3b8;cursor:pointer;transition:.12s}
.wb:hover,.wb.on{background:#1d3557;border-color:#3b82f6;color:#60a5fa}
.mx{border-collapse:collapse;width:100%}
.mx th,.mx td{padding:5px 8px;border:1px solid #334155;font-size:11px}
.mx th{background:#1e293b;color:#94a3b8;font-weight:600}
.mx td{background:#263244;color:#e2e8f0;text-align:center}
/* ── STATUS PICKER POPUP ────────────────────────── */
.status-popup{position:fixed;z-index:9999;background:#1e293b;border:1px solid #334155;border-radius:10px;padding:12px;box-shadow:0 8px 32px rgba(0,0,0,.6);min-width:200px;display:none}
.status-popup.open{display:block}
.sp-title{font-size:11px;font-weight:600;color:#64748b;margin-bottom:8px;text-transform:uppercase;letter-spacing:.05em}
.sp-btn{display:flex;align-items:center;gap:8px;width:100%;padding:7px 10px;border-radius:6px;border:none;font-size:12px;font-weight:600;cursor:pointer;margin-bottom:4px;transition:.12s}
.sp-btn:hover{filter:brightness(1.15)}
.sp-close{color:#64748b;font-size:11px;cursor:pointer;text-align:center;padding:4px;margin-top:2px}
.sp-close:hover{color:#e2e8f0}
/* ── ABSENCES MANAGER ───────────────────────────── */
.abs-grid{display:grid;grid-template-columns:1fr 1fr 1fr 1fr 1fr 1fr 1fr;gap:4px;margin-top:8px}
.abs-day{border-radius:6px;padding:6px 4px;text-align:center;cursor:pointer;border:1.5px solid #334155;background:#1e293b;transition:.12s;font-size:11px;font-weight:600;color:#64748b}
.abs-day:hover{border-color:#475569}
.abs-day.cp {border-color:#16a34a;background:#14532d30;color:#4ade80}
.abs-day.mal{border-color:#dc2626;background:#7f1d1d30;color:#fca5a5}
.abs-day.tad{border-color:#0284c7;background:#0c4a6e30;color:#7dd3fc}
.abs-day.frm{border-color:#d97706;background:#78350f30;color:#fde68a}
.abs-day.off{border-color:#1e3a5f;background:#0c1220;color:#1e3a5f}
/* Status legend */
.stat-legend{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px}
.sl-item{display:flex;align-items:center;gap:5px;font-size:11px}
.sl-dot{width:12px;height:12px;border-radius:3px}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:#0f172a}
::-webkit-scrollbar-thumb{background:#334155;border-radius:3px}
@keyframes tin{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.toast{animation:tin .2s ease}


input[type=date]{cursor:pointer;min-height:34px}
input[type=date]::-webkit-calendar-picker-indicator{filter:invert(0.7);cursor:pointer;padding:2px}
.vis-toggle{position:relative;display:inline-block;width:36px;height:20px;cursor:pointer;vertical-align:middle}
.vis-toggle input{opacity:0;width:0;height:0}
.vis-slider{position:absolute;inset:0;background:#334155;border-radius:20px;transition:.2s}
.vis-slider:before{content:'';position:absolute;height:14px;width:14px;left:3px;top:3px;background:#64748b;border-radius:50%;transition:.2s}
.vis-toggle input:checked+.vis-slider{background:#16a34a}
.vis-toggle input:checked+.vis-slider:before{transform:translateX(16px);background:#fff}
#auth-screen{position:fixed;inset:0;background:linear-gradient(150deg,#020617 0%,#0f172a 50%,#1e3a5f 100%);display:flex;align-items:center;justify-content:center;z-index:9999}
.auth-box{background:#1e293b;border-radius:16px;padding:40px;width:400px;box-shadow:0 20px 60px rgba(0,0,0,.5);color:#e2e8f0}
.auth-logo{text-align:center;margin-bottom:24px}
.auth-logo h1{font-size:22px;font-weight:700;color:#60a5fa}
.auth-logo p{color:#64748b;font-size:12px;margin-top:4px}
.fg{margin-bottom:14px}
.fg label{display:block;font-size:12px;font-weight:500;color:#94a3b8;margin-bottom:5px}
.fg input,.fg select{width:100%;padding:9px 12px;border:1.5px solid #334155;border-radius:6px;font-size:13px;background:#0f172a;color:#e2e8f0;outline:none}
.fg input:focus{border-color:#3b82f6}
.auth-error{background:rgba(220,38,38,.15);color:#fca5a5;padding:8px 12px;border-radius:6px;font-size:12px;margin-bottom:12px;display:none}
.btn-auth{width:100%;padding:10px;background:#3b82f6;color:#fff;border:none;border-radius:6px;font-size:14px;font-weight:600;cursor:pointer}
.btn-auth:hover{background:#2563eb}
.hidden{display:none!important}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:8000;display:flex;align-items:center;justify-content:center}
.modal-box{background:#1e293b;border-radius:12px;padding:24px;width:500px;max-width:95vw;max-height:90vh;overflow-y:auto;box-shadow:0 8px 32px rgba(0,0,0,.5);color:#e2e8f0}
.modal-title{font-size:16px;font-weight:700;margin-bottom:16px;color:#f1f5f9}
.modal-footer{display:flex;gap:8px;justify-content:flex-end;margin-top:16px}
.dtbl{width:100%;border-collapse:collapse;font-size:12px}
.dtbl th{text-align:left;padding:8px 10px;font-size:11px;font-weight:600;color:#94a3b8;background:#0f172a;border-bottom:1px solid #334155}
.dtbl td{padding:7px 10px;border-bottom:1px solid #1e293b;color:#e2e8f0}
.dtbl tr:hover td{background:#263244}
.bdg{display:inline-flex;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:600}
.bdg-admin{background:rgba(245,158,11,.2);color:#fbbf24}
.bdg-sup{background:rgba(59,130,246,.15);color:#60a5fa}
.bdg-tl{background:rgba(16,185,129,.15);color:#34d399}
.bdg-agent{background:rgba(22,163,74,.15);color:#4ade80}
.bdg-ho{background:rgba(59,130,246,.15);color:#60a5fa}
.bdg-hno{background:rgba(168,85,247,.15);color:#c084fc}
.ns{font-size:9px;font-weight:700;color:#475569;text-transform:uppercase;letter-spacing:.6px;padding:14px 10px 4px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
input[type=email],input[type=password]{padding:6px 10px;border:1px solid #334155;border-radius:6px;background:#1e293b;color:#e2e8f0;outline:none;width:100%}
</style>
</head>
<body>
<script>
(function(){
  document.addEventListener('contextmenu',function(e){e.preventDefault()});
  document.addEventListener('keydown',function(e){
    if(e.key==='F12'||(e.ctrlKey&&e.shiftKey&&/[IJC]/.test(e.key))||(e.ctrlKey&&/[uUsS]/.test(e.key))){e.preventDefault();return false;}
  });
  setInterval(function(){var t=performance.now();debugger;if(performance.now()-t>80){document.documentElement.innerHTML='';window.location='about:blank';}},15e3);
  setInterval(function(){if(window.outerWidth-window.innerWidth>160||window.outerHeight-window.innerHeight>160){document.documentElement.innerHTML='';}},10e3);
  Object.defineProperty(window,'console',{get:function(){return{log:function(){},warn:function(){},error:function(){},info:function(){},dir:function(){},table:function(){}};}});
})();
</script>

<!-- AUTH SCREEN -->
<div id="auth-screen">
  <div class="auth-box">
    <div class="auth-logo">
      <h1>Planning Multi CCO 2026</h1>
      <p>Centre de Contacts Opérationnel</p>
    </div>
    <div id="auth-error" class="auth-error"></div>
    <div id="login-form">
      <div class="fg"><label>Adresse e-mail</label><input type="email" id="login-email" placeholder="votre@email.fr"></div>
      <div class="fg"><label>Mot de passe</label><input type="password" id="login-password" placeholder="••••••••"></div>
      <button class="btn-auth" onclick="doLogin()">Se connecter</button>
    </div>
    <div id="change-pw-form" class="hidden">
      <p style="font-size:12px;color:#94a3b8;margin-bottom:14px">🔐 Première connexion — définissez votre nouveau mot de passe</p>
      <div class="fg"><label>Nouveau mot de passe</label><input type="password" id="new-pw1" placeholder="Minimum 8 caractères"></div>
      <div class="fg"><label>Confirmer</label><input type="password" id="new-pw2" placeholder="Répétez le mot de passe"></div>
      <button class="btn-auth" onclick="changePW()">Valider & Se connecter</button>
    </div>
  </div>
</div>

<div id="app" style="display:none">
<div id="sb">
  <div id="sbh"><h1>Planning Multi CCO 2026</h1><p>Centre de Contacts Opérationnel</p></div>
  <div id="sbn"></div>
  <div id="sbf">
    <div class="sb-stats">
      <div class="ss"><span class="sv" id="sft">0</span><span class="sl">Techs</span></div>
      <div class="ss"><span class="sv" id="sfc">0</span><span class="sl">Clients</span></div>
      <div class="ss"><span class="sv" id="sfv">—</span><span class="sl">Appels</span></div>
    </div>
    <div id="sb-user" style="padding:8px 14px;border-top:1px solid #1e293b;display:none">
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
      <div id="sb-avatar" style="width:28px;height:28px;border-radius:50%;background:#3b82f6;color:#fff;display:flex;align-items:center;justify-content:center;font-weight:600;font-size:12px">A</div>
      <div><div id="sb-name" style="font-size:12px;font-weight:500;color:#f1f5f9">Utilisateur</div><div id="sb-role" style="font-size:10px;color:#64748b">Rôle</div></div>
    </div>
    <button class="btn btn-sm" style="width:100%;font-size:11px" onclick="doLogout()">⬡ Déconnexion</button>
    <div id="save-ind" style="font-size:9px;color:#475569;text-align:center;margin-top:4px;display:none">💾 Sauvegardé</div>
    <button id="btn-reset" onclick="resetData()" style="display:none;margin-top:4px;width:100%;background:rgba(220,38,38,.12);color:#fca5a5;border:none;border-radius:4px;padding:3px 6px;font-size:10px;cursor:pointer">⚠️ Réinitialiser</button>
  </div>
</div>
</div>
<div id="main">
  <div id="tb">
    <h2 id="tbt">Techniciens</h2>
    <div id="tba" style="display:flex;gap:8px;align-items:center"></div>
  </div>
  <div id="ct"></div>
</div>
</div>

<!-- STATUS PICKER POPUP -->
<div class="status-popup" id="sp">
  <div class="sp-title" id="sp-title">Statut du jour</div>
  <button class="sp-btn" style="background:#1e3a5f;color:#e2e8f0" onclick="setStatus('work')">🕐 Créneau auto (travail)</button>
  <button class="sp-btn" style="background:#15803d;color:#fff" onclick="setStatus('CP')">🌴 CP — Congés payés</button>
  <button class="sp-btn" style="background:#b91c1c;color:#fff" onclick="setStatus('MAL')">🤒 MAL — Maladie</button>
  <button class="sp-btn" style="background:#0c4a6e;color:#7dd3fc" onclick="setStatus('TAD')">🏠 TAD — Télétravail</button>
  <button class="sp-btn" style="background:#78350f;color:#fde68a" onclick="setStatus('FRM')">📚 FRM — Formation</button>
  <button class="sp-btn" style="background:#374151;color:#9ca3af" onclick="setStatus('off')">💤 Repos / Jour off</button>
  <div class="sp-close" onclick="closeSP()">✕ Fermer</div>
</div>
